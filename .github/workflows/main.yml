name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run backend tests
        run: npm run test
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      
      - name: Running frontend test
        run: npm test
        working-directory: frontend
      
      - name: Backend linting test
        run: npm run lint 
        working-directory: backend
      
      - name: Frontend linting test
        run: npm run lint
        working-directory: frontend