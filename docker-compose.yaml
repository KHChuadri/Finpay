# docker-compose.yml
services:
  frontend:
    build: ./frontend
    container_name: finpay-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  backend:
    build: ./backend
    container_name: finpay-backend
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Override any localhost values from .env: inside the compose network the
      # datastores are reachable by service name, not localhost.
      - DATABASE_URL=postgresql://finpay:finpay@postgres:5432/finpay
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    command: ["npm", "run", "dev"]

  redis:
    image: redis:latest
    container_name: redis-payment
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres-payment
    environment:
      POSTGRES_USER: finpay
      POSTGRES_PASSWORD: finpay
      POSTGRES_DB: finpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpay -d finpay"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  postgres_data: